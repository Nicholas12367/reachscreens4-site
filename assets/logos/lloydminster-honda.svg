<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-label="Honda">
  <!-- Honda H mark in a red rounded square, sized to fill the cube width-wise -->
  <rect x="60" y="6" width="120" height="86" rx="10" fill="#E40521"/>
  <!-- Stylised H — two posts + crossbar in white -->
  <path d="M88 22 H102 V44 H138 V22 H152 V76 H138 V56 H102 V76 H88 Z" fill="#FFFFFF"/>
  <!-- Wordmark beneath -->
  <text x="120" y="138" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="700" font-size="42"
        letter-spacing="2"
        fill="#E40521">HONDA</text>
</svg>
